<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskNate</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./assets/Nav-logo.svg"
      type="image/x-icon"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="navbar">
        <a href="#" class="nav-logo logo-tasknate">
          <img src="./assets/Nav-logo.svg" alt="TaskNate Logo" />
        </a>
        <a href="#" class="nav-logo logo-talrop">
          <img src="./assets/Talrop_Logo.svg" alt="Talrop Logo" />
        </a>
      </header>

      <main class="main-content">
        <div class="main-image">
          <img src="./assets/Tasknate_SVG.svg" alt="TaskNate Main Image" />
        </div>
        <div class="description">
          <div class="glow-strip strip-a"></div>
          <div class="glow-strip strip-n"></div>
          <p>
            Let Tasknate handle your tasks effortlessly with AI-driven
            automation. From managing workflows to executing tasks in real-time,
            Tasknate optimises productivity by taking action on your behalf.
            Experience hands-free efficiency like never before!
          </p>
          <h1 class="launch-heading">LAUNCHING SOON!</h1>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
